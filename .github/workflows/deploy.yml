name: Build and Deploy Frontend

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"               # ✅ Copy contents of dist, not the folder itself
          target: "/var/www/talentcio/frontend/"
          strip_components: 1            # ✅ Flatten the contents
          overwrite: true                # ✅ Replace existing files

      - name: Fix permissions and reload Nginx
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Keep files owned by deploy (so future deploys can write)
            # But ensure they are readable by www-data (Nginx)
            sudo chown -R deploy:deploy /var/www/talentcio/frontend
            sudo find /var/www/talentcio/frontend -type d -exec chmod 755 {} \;
            sudo find /var/www/talentcio/frontend -type f -exec chmod 644 {} \;
            sudo systemctl reload nginx
